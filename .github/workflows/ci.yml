name: CI

on:
  push:
    branches: [ main, feat/phase1-dm, finalize/phase1-all, finalize/phase1-final ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run tests (if any)
        run: npm test || echo 'No tests defined'
      - name: Build
        run: npm run build --if-present
