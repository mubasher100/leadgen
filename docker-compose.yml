version: '3.8'

services:
  # Next.js Application
  app:
    build: .
    container_name: leadgen-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
      SUPABASE_URL: http://postgres:5432
      ADMIN_PHASE7_JWT_SECRET: ${ADMIN_PHASE7_JWT_SECRET:-dev-secret-key-do-not-use-in-production}
      ENABLE_AI_SCORING: "true"
      ENABLE_REAL_TIME_NOTIFICATIONS: "true"
      ENABLE_WORKFLOW_AUTOMATION: "true"
      ENABLE_AUDIT_LOGGING: "true"
      RATE_LIMIT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - leadgen

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: leadgen-postgres
    environment:
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: leadgen123
      POSTGRES_DB: leadgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadgen

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - leadgen

  # Adminer (Optional - Database UI)
  adminer:
    image: adminer:latest
    container_name: leadgen-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - leadgen

volumes:
  postgres_data:
  redis_data:

networks:
  leadgen:
    driver: bridge
